name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install static tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run static, parser, core, and network tests
        run: tests/run.sh --download
